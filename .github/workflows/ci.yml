name: Mosaic CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[dev]"

      - name: Cache datasets
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/mosaic
            ~/.cache/huggingface
          key: mosaic-datasets-${{ hashFiles('src/mosaic/eval/loaders/beir_scifact.py') }}
          restore-keys: |
            mosaic-datasets-

      - name: Ruff
        run: ruff check src tests

      - name: Pytest
        run: pytest --cov=mosaic --cov-report=term-missing -m "not slow"

      - name: Benchmark SciFact (mock, no torch)
        run: mosaic-benchmark --dataset scifact --max-samples 20 --embedder mock --output benchmarks/results

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mosaic-benchmark-results
          path: benchmarks/results/
